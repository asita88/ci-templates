name: Build and Release (OpenResty)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      build_script:
        required: false
        type: string
        default: 'scripts/build.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - run: yum install -y git nodejs
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          BRANCH=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')
          DATE=$(date +%Y%m%d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ARTIFACT_NAME=${{ inputs.app_name }}-${BRANCH}-${SHA}-"at"-${DATE}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build
        env:
          APP_NAME: ${{ inputs.app_name }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
          DATE: ${{ steps.version.outputs.date }}
          ARTIFACT_NAME: ${{ steps.version.outputs.artifact_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          mkdir -p release
          chmod +x ${{ inputs.build_script }}
          ${{ inputs.build_script }}

      - name: Create release archive
        run: tar -czf ${{ steps.version.outputs.artifact_name }}.tar.gz -C release .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ steps.version.outputs.artifact_name }}.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.artifact_name }}.tar.gz
          tag_name: ${{ github.ref_name }}
          name: ${{ inputs.app_name }} ${{ github.ref_name }}
          body: |
            ## ${{ inputs.app_name }} ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "${{ needs.build.outputs.artifact_name }}.tar.gz"
          target: "/tmp"

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            id nginx &>/dev/null || useradd -r -s /sbin/nologin nginx
            mkdir -p /opt/${{ inputs.app_name }}
            ARTIFACT_NAME='${{ needs.build.outputs.artifact_name }}'
            tar -xzf /tmp/"$ARTIFACT_NAME.tar.gz" -C /opt/${{ inputs.app_name }}
            rm -f /tmp/"$ARTIFACT_NAME.tar.gz"
            chown -R nginx:nginx /opt/${{ inputs.app_name }}
            /opt/${{ inputs.app_name }}/openresty/nginx/sbin/nginx -s reload -p /opt/${{ inputs.app_name }}/apiok -c /opt/${{ inputs.app_name }}/apiok/conf/nginx.conf 2>/dev/null || true
