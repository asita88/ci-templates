name: Build and Release (Node)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      healthcheck_url:
        required: false
        type: string
        default: ''
      node_version:
        required: false
        type: string
        default: '20'
      build_script:
        required: false
        type: string
        default: 'scripts/build.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # - name: Install dependencies
      #   run: |
      #     if [ -f package-lock.json ]; then npm ci; elif [ -f pnpm-lock.yaml ]; then pnpm i --frozen-lockfile; elif [ -f yarn.lock ]; then yarn install --frozen-lockfile; else npm install; fi
      - name: Install dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm i --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          BRANCH=$(echo '${{ github.ref_name }}' | sed 's/\//-/g')
          DATE=$(date +%Y%m%d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ARTIFACT_NAME=${{ inputs.app_name }}-${BRANCH}-${SHA}-"at"-${DATE}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build
        env:
          APP_NAME: ${{ inputs.app_name }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
          DATE: ${{ steps.version.outputs.date }}
          ARTIFACT_NAME: ${{ steps.version.outputs.artifact_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          mkdir -p release
          chmod +x ${{ inputs.build_script }}
          ${{ inputs.build_script }}
          if [ -f scripts/deploy.sh ]; then
            cp -f scripts/deploy.sh release/deploy.sh
            chmod +x release/deploy.sh
          fi

      - name: Create release archive
        run: tar -czf ${{ steps.version.outputs.artifact_name }}.tar.gz -C release .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ steps.version.outputs.artifact_name }}.tar.gz
          retention-days: 1

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.artifact_name }}.tar.gz
          tag_name: ${{ github.ref_name }}
          name: ${{ inputs.app_name }} ${{ github.ref_name }}
          body: |
            ## ${{ inputs.app_name }} ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-${{ github.repository }}-${{ inputs.app_name }}-production
      cancel-in-progress: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "${{ needs.build.outputs.artifact_name }}.tar.gz"
          target: "/tmp"

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="/opt/${{ inputs.app_name }}"
            OLD_DIR="$(readlink -f "$APP_DIR/current" 2>/dev/null || true)"
            ARTIFACT_NAME='${{ needs.build.outputs.artifact_name }}'
            RELEASE_DIR="$APP_DIR/releases/$ARTIFACT_NAME"
            echo "[deploy] app=${{ inputs.app_name }} artifact=$ARTIFACT_NAME host=$(hostname) at=$(date -Is)"
            mkdir -p "$APP_DIR/releases"
            mkdir -p "$RELEASE_DIR"
            tar -xzf /tmp/"$ARTIFACT_NAME.tar.gz" -C "$RELEASE_DIR"
            rm -f /tmp/"$ARTIFACT_NAME.tar.gz"
            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            cd "$APP_DIR/current"
            if [ -f "$APP_DIR/current/deploy.sh" ]; then
              chmod +x "$APP_DIR/current/deploy.sh"
              APP_DIR="$APP_DIR" CURRENT_DIR="$APP_DIR/current" RELEASE_DIR="$RELEASE_DIR" OLD_DIR="$OLD_DIR" "$APP_DIR/current/deploy.sh"
            else
              pm2 restart ${{ inputs.app_name }} || true
            fi
            if [ -n "${{ inputs.healthcheck_url }}" ]; then
              for i in {1..30}; do
                curl -fsS "${{ inputs.healthcheck_url }}" >/dev/null && exit 0
                sleep 1
              done
              echo "healthcheck failed: ${{ inputs.healthcheck_url }}" 1>&2
              exit 1
            fi
